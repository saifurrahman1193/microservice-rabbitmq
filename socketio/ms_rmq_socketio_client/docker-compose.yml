version: '3.3'
services:
  msrmq_socketio_client:
    image: socketio-react-client-image
    container_name: ms-socketio-client-container
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '804:3000'
    volumes:
      - .:/app
    stdin_open: true
    tty: true
    networks:
      - local_central_rabbitmq_network

networks:
  local_central_rabbitmq_network:
    external: true