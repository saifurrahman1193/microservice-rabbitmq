version: '3.3'
services:
  msrmq_export:
    build:
      context: .
      dockerfile: Dockerfile
    command: 'php artisan serve --host=0.0.0.0'
    container_name: ms-rmq-export-container
    restart: unless-stopped
    volumes:
      - .:/app
    ports:
      - 801:8000
    networks:
      - local_central_rabbitmq_network
networks:
  local_central_rabbitmq_network:
    external: true

